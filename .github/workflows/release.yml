name: Release

# Manual. Publishing is a decision, not a consequence of merging.
on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: Pack and inspect without publishing.
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.6.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm typecheck
      - run: pnpm build
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for package in trace editor runner; do
            if [ "${{ inputs.dry-run }}" = "true" ]; then
              pnpm --filter "@cutscene/$package" pack --pack-destination /tmp
            else
              pnpm --filter "@cutscene/$package" publish --access public --no-git-checks
            fi
          done
      - name: Package the extension
        run: |
          cd packages/extension/dist
          zip -qr /tmp/cutscene-extension.zip .
      - uses: actions/upload-artifact@v4
        with:
          name: cutscene-extension
          path: /tmp/cutscene-extension.zip
          retention-days: 30
